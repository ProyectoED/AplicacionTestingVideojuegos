    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }

        body {
            background: radial-gradient(circle at top left, #f1f3ff 0%, #ffffff 40%, #e9edff 100%);
            min-height: 100vh;
        }

        .text-label-caps {
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        .shadow-neon {
            box-shadow: 0 0 40px rgba(210, 187, 255, 0.3);
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>

<body class="text-on-surface font-body-md overflow-hidden">
    <!-- Top Controls (Floating Icons) -->
    <nav
        class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-container-padding py-8 pointer-events-none">
        <div class="pointer-events-auto">
            <button

            </button>
        </div>
        <div class="flex items-center gap-sm pointer-events-auto">
            <button
                class="w-12 h-12 flex items-center justify-center rounded-full glass-panel hover:bg-white/60 transition-all duration-300">
                <span class="material-symbols-outlined text-on-surface-variant/70">notifications</span>
            </button>
            <button
                class="w-12 h-12 flex items-center justify-center rounded-full glass-panel hover:bg-white/60 transition-all duration-300">
                <span class="material-symbols-outlined text-on-surface-variant/70">person</span>
            </button>
        </div>
    </nav>
    <!-- Main Content Canvas -->
    <main class="relative h-screen w-full flex flex-col items-center justify-center px-container-padding pt-12">
        <div class="w-full h-full flex flex-col items-center justify-center gap-12 max-w-[1600px]">
            <!-- Central Hero Action Panels: Significantly Larger Circular Buttons -->
            <div class="flex-1 flex items-center justify-center gap-xl w-full">
                <!-- Register Game Button -->
                <button
                    class="glass-panel group relative rounded-full flex flex-col items-center justify-center gap-lg hover:scale-[1.02] transition-all duration-500 hover:bg-white/50 overflow-hidden shadow-neon w-[580px] h-[580px]">
                    <div
                        class="absolute inset-0 bg-gradient-to-br from-primary/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity">
                    </div>
                    <div
                        class="w-48 h-48 rounded-full bg-white/40 border border-white/60 flex items-center justify-center group-hover:scale-110 transition-transform duration-500">
                        <span class="material-symbols-outlined text-[100px] text-primary"
                            style="font-variation-settings: &quot;wght&quot; 200;">add_circle</span>
                    </div>
                    <div class="text-center z-10 px-12">
                        <h2 class="font-headline-xl text-[44px] text-primary mb-2">Dar de alta juego</h2>
                        <p class="text-on-surface-variant/60 font-medium tracking-widest uppercase text-xs"><br></p>
                    </div>
                </button>
                <!-- Access Stats Button -->
                <button
                    class="glass-panel group relative rounded-full flex flex-col items-center justify-center gap-lg hover:scale-[1.02] transition-all duration-500 hover:bg-white/50 overflow-hidden shadow-neon w-[580px] h-[580px]"
                    onclick="window.location.href='./stats.html'">
                    <div
                        class="absolute inset-0 bg-gradient-to-bl from-secondary/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity">
                    </div>
                    <div
                        class="w-48 h-48 rounded-full bg-white/40 border border-white/60 flex items-center justify-center group-hover:scale-110 transition-transform duration-500">
                        <span class="material-symbols-outlined text-[100px] text-primary"
                            style="font-variation-settings: &quot;wght&quot; 200;">analytics</span>
                    </div>
                    <div class="text-center z-10 px-12">
                        <h2 class="font-headline-xl text-[44px] text-primary mb-2">Acceder a estadísticas</h2>
                        <p class="text-on-surface-variant/60 font-medium tracking-widest uppercase text-xs"><br></p>
                    </div>
                </button>
            </div>
            <!-- Footer Summary Strip: Transformed into Wider/Taller Scrollable Wheel -->
            <div class="w-full">
                <div class="mx-auto pb-4 max-w-[95%]">
                    <div
                        class="glass-panel py-4 px-4 flex items-center overflow-x-auto hide-scrollbar cursor-grab active:cursor-grabbing rounded-full active">
                        <div class="flex items-center min-w-full justify-around gap-12 px-20">
                            <div class="text-center flex-shrink-0 min-w-[220px]">

                            <div class="w-px h-12 bg-on-surface-variant/10 flex-shrink-0"></div>

                            </div>
                            <div class="w-px h-12 bg-on-surface-variant/10 flex-shrink-0"></div>

                                <p class="font-label-caps text-on-surface-variant/80 mb-1 text-lg font-bold">Porcentaje
                                    de compleción media de tus juegos:</p>
                                <p class="font-headline-lg text-[32px] text-primary leading-none font-semibold">52.5%
                                </p>
                            </div>

    </div>
    <script>
        // Simple drag scroll for the stats wheel
        const slider = document.querySelector('.overflow-x-auto');
        let isDown = false;
        let startX;
        let scrollLeft;

        slider.addEventListener('mousedown', (e) => {
            isDown = true;
            slider.classList.add('active');
            startX = e.pageX - slider.offsetLeft;
            scrollLeft = slider.scrollLeft;
        });
        slider.addEventListener('mouseleave', () => {
            isDown = false;
        });
        slider.addEventListener('mouseup', () => {
            isDown = false;
        });
        slider.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - slider.offsetLeft;
            const walk = (x - startX) * 2;
            slider.scrollLeft = scrollLeft - walk;
        });
    </script>


</body>
